<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="terminal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecf0f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="2" y="2" width="28" height="28" rx="6" ry="6" fill="url(#bg)" />

  <!-- Terminal window frame -->
  <rect x="6" y="8" width="20" height="16" rx="2" ry="2" fill="#2c3e50" stroke="url(#terminal)" stroke-width="0.5"/>

  <!-- Terminal header dots -->
  <circle cx="8.5" cy="11" r="1" fill="#e74c3c"/>
  <circle cx="11.5" cy="11" r="1" fill="#f39c12"/>
  <circle cx="14.5" cy="11" r="1" fill="#27ae60"/>

  <!-- Terminal prompt symbol -->
  <path d="M8 15 L11 17 L8 19" stroke="url(#terminal)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor -->
  <rect x="13" y="16.5" width="1" height="2" fill="url(#terminal)"/>

  <!-- Code elements -->
  <rect x="15" y="17" width="6" height="1" fill="url(#terminal)" opacity="0.7"/>
  <rect x="8" y="20" width="4" height="1" fill="url(#terminal)" opacity="0.5"/>
  <rect x="13" y="20" width="8" height="1" fill="url(#terminal)" opacity="0.5"/>
</svg>

